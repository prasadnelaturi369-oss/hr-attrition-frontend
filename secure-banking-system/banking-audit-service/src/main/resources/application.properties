server.port=8085
spring.application.name=audit-service

# H2 Database
spring.datasource.url=jdbc:h2:mem:banking_audit
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Eureka
eureka.client.service-url.defaultZone=http://eureka:eureka123@localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# DISABLE KAFKA COMPLETELY
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging
logging.level.com.banking.audit=DEBUG
logging.level.org.springframework.web=INFO

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always