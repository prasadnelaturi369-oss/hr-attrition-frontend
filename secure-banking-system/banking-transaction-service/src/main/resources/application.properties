#spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
#spring.kafka.consumer.properties.spring.json.trusted.packages=*
#spring.kafka.consumer.properties.spring.json.type.mapping=transactionEvent:com.banking.transaction.dto.TransactionEvent

# Account Service URL
#account.service.url=http://account-service
account.service.url=http://localhost:8082

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.operationsSorter=method

# Logging Configuration
logging.level.com.banking.transaction=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Management/Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Resilience4j
resilience4j.retry.instances.accountService.maxAttempts=3
resilience4j.retry.instances.accountService.waitDuration=100ms
resilience4j.retry.instances.accountService.retryExceptions=org.springframework.web.client.ResourceAccessException

# Transaction Limits
transaction.max.amount=100000
transaction.daily.limit=500000
transaction.min.amount=0.01

# Lock Configuration
transaction.lock.timeout.ms=5000
transaction.lock.retry.attempts=3