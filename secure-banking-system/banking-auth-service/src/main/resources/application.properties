server.port=8081
spring.application.name=auth-service

# H2 In-Memory Database (No PostgreSQL needed)
spring.datasource.url=jdbc:h2:mem:banking_auth
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop

# Eureka Configuration
eureka.client.service-url.defaultZone=http://eureka:eureka123@localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging
logging.level.com.banking.auth=DEBUG